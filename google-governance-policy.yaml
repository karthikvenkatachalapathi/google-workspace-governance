version: 1
mode: example_seed_policy
effective_behavior: acl_enforced
unknown_profile_default: ask
unknown_resource_default: ask
unknown_google_url_default: deny
workflow_intent_policy_role: audit_metadata_only
accounts:
  workspace-primary:
    description: Example Google Workspace account connected from the control UI.
    google_account_hint: workspace-admin@example.com
    status: example_not_connected
    current_profile_routes:
      agent-a: agent-a/workspace-primary
  workspace-shared:
    description: Example secondary Workspace account for a different operational boundary.
    google_account_hint: shared-workspace@example.com
    status: example_not_connected
    current_profile_routes:
      agent-b: agent-b/workspace-shared
profiles:
  agent-a:
    account_alias: workspace-primary
    default_route_alias: agent-a/workspace-primary
    description: Example agent or automation identity.
  agent-b:
    account_alias: workspace-shared
    default_route_alias: agent-b/workspace-shared
    description: Example agent or automation identity with a separate account route.
operation_classes:
  gmail_read:
    actions:
    - gmail.search
    - gmail.read
    default_decision: ask
  gmail_send:
    actions:
    - gmail.send
    default_decision: deny
  calendar_read:
    actions:
    - calendar.list
    - calendar.get
    - calendar.freebusy
    default_decision: ask
  calendar_mutation:
    actions:
    - calendar.create
    - calendar.update
    - calendar.delete
    default_decision: ask
  drive_read:
    actions:
    - drive.search
    - drive.read
    - drive.download
    default_decision: ask
  drive_mutation:
    actions:
    - drive.upload
    - drive.update
    - drive.share
    - drive.delete
    default_decision: deny
  docs_mutation:
    actions:
    - docs.create
    - docs.update
    - docs.export
    default_decision: ask
  sheets_mutation:
    actions:
    - sheets.read
    - sheets.append
    - sheets.update
    - sheets.batch_update
    default_decision: ask
  contacts_read:
    actions:
    - contacts.search
    - contacts.read
    default_decision: ask
profile_policy:
  agent-a:
    account_alias: workspace-primary
    defaults:
      gmail.search: allow
      gmail.read: allow
      calendar.freebusy: allow
      drive.search: allow
      drive.read: ask
      gmail.send: ask
      drive.share: ask
      drive.delete: deny
    resource_overrides: {}
  agent-b:
    account_alias: workspace-shared
    defaults:
      gmail.search: ask
      gmail.read: ask
      calendar.freebusy: allow
      drive.search: allow
      drive.read: ask
      gmail.send: ask
      drive.share: deny
      drive.delete: deny
    resource_overrides: {}
global_deny:
  high_risk_global:
  - drive.delete
