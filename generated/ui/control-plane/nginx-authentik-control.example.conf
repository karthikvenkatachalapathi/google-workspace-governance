# Example protected reverse proxy for the Google governance control plane.
# Install via Nginx Proxy Manager/Authentik, or translate this into NPM Advanced config.
# Upstream control service must stay bound to 127.0.0.1:8095. Do not expose it directly on LAN.
# The app also enforces username/password Basic Auth as a second layer.

server {
    listen 443 ssl http2;
    server_name google-governance-control.internal.example;

    location /outpost.goauthentik.io/ {
        proxy_pass http://authentik-outpost:9000/outpost.goauthentik.io/;
        proxy_set_header Host $host;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;
    }

    location / {
        auth_request /outpost.goauthentik.io/auth/nginx;
        error_page 401 = @goauthentik_proxy_signin;
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location @goauthentik_proxy_signin {
        internal;
        add_header Set-Cookie $auth_cookie;
        return 302 /outpost.goauthentik.io/start?rd=$scheme://$http_host$request_uri;
    }
}
